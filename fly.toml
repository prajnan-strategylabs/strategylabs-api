# fly.toml — Strategy Labs API
# Deploy: fly deploy
# Docs: https://fly.io/docs/reference/configuration/

app = "strategylabs-api"
primary_region = "sin"   # Singapore — closest to AU/SEA users; change to "lax" for US

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  # V22 live scanner needs the machine always-on. The asyncio background task
  # runs the scanner at every 4H candle close (+ 1min open-position checks).
  # Auto-stopping would cold-start the app and lose the in-memory scanner state.
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

[[vm]]
  # Bumped from 256MB → 512MB to accommodate pandas/numpy/ccxt + the V22
  # scanner's in-memory OHLCV cache for 47 symbols × 3 timeframes.
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
